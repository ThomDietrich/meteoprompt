name: meteoprompt

services:
  web:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Bind dev server to all interfaces so the host port mapping works.
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
      # Polling makes file watching reliable across the macOS/Docker bind mount.
      - WATCHPACK_POLLING=true
      # Run the container in local time so JS Date getters (heatmapHourDay,
      # calendar dayKey) align with the Flux Europe/Berlin windows. Needs tzdata
      # (installed in the Dockerfile base stage).
      - TZ=Europe/Berlin
    volumes:
      # Source bind-mount for hot reload …
      - ./:/app
      # … but keep container-installed deps and build cache from being shadowed
      #    by the host mount (named/anonymous volumes seed from the image).
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      # Server-side runtime data (pinned cards, failed-query log). A named
      # volume so it persists across rebuilds and isn't tied to the host tree
      # (overrides the ./:/app bind-mount for this nested path). spec-05 §8.
      - app_data:/app/data
    command: npm run dev

volumes:
  node_modules:
  next_cache:
  app_data:
